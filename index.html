<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Tracker — GitHub Dashboard</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --orange: #db6d28;
    --purple: #bc8cff;
    --pink: #f778ba;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 16px 24px; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { color: var(--text-muted); font-weight: 400; }
  .header-controls { display: flex; gap: 12px; align-items: center; }
  .refresh-btn {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }
  .refresh-btn:hover { border-color: var(--accent); }
  .refresh-btn.loading { opacity: 0.6; pointer-events: none; }
  .last-updated { font-size: 12px; color: var(--text-muted); }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 20px; flex: 1; min-width: 140px;
  }
  .stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-card .value { font-size: 28px; font-weight: 600; margin-top: 2px; }
  .stat-card .value.green { color: var(--green); }
  .stat-card .value.red { color: var(--red); }
  .stat-card .value.yellow { color: var(--yellow); }
  .stat-card .value.accent { color: var(--accent); }

  /* Section */
  .section { margin-bottom: 32px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-header h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .section-header .count {
    background: var(--border); color: var(--text-muted); font-size: 12px;
    padding: 1px 8px; border-radius: 10px; font-weight: 500;
  }
  .filters { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-muted);
    padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 12px;
  }
  .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filter-btn:hover { border-color: var(--text-muted); }

  /* Table */
  .table-wrap {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 10px 16px; font-size: 12px; color: var(--text-muted);
    border-bottom: 1px solid var(--border); font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  td { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover { background: rgba(88, 166, 255, 0.04); }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* Pills */
  .pill {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; font-weight: 500; line-height: 1.5;
  }
  .pill-bug { background: #f8514922; color: var(--red); }
  .pill-enhancement { background: #58a6ff22; color: var(--accent); }
  .pill-claimed { background: #3fb95022; color: var(--green); }
  .pill-question { background: #bc8cff22; color: var(--purple); }
  .pill-needs-clarification { background: #d2992222; color: var(--yellow); }
  .pill-other { background: #8b949e22; color: var(--text-muted); }

  /* Claude status */
  .claude-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500;
  }
  .claude-pass { background: #3fb95022; color: var(--green); }
  .claude-fail { background: #f8514922; color: var(--red); }
  .claude-pending { background: #d2992222; color: var(--yellow); }
  .claude-skipped { background: #8b949e22; color: var(--text-muted); }
  .claude-triaged { background: #bc8cff22; color: var(--purple); }
  .claude-icon { font-size: 13px; }

  /* Review decision */
  .review-approved { color: var(--green); }
  .review-changes { color: var(--red); }
  .review-pending { color: var(--text-muted); }

  /* CI */
  .ci-pass { color: var(--green); }
  .ci-fail { color: var(--red); }
  .ci-pending { color: var(--yellow); }

  /* PR Cards */
  .pr-card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 12px;
  }
  .pr-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
    transition: border-color 0.15s;
  }
  .pr-card:hover { border-color: var(--text-muted); }
  .pr-card.checks-pass {
    background: #116329; border-color: #3fb950; color: #fff;
  }
  .pr-card.checks-pass .pr-card-number,
  .pr-card.checks-pass .pr-card-age,
  .pr-card.checks-pass .pr-card-meta-item,
  .pr-card.checks-pass .review-pending { color: rgba(255,255,255,0.8); }
  .pr-card.checks-pass .pr-card-title a { color: #fff; }
  .pr-card.checks-pass .pr-card-title a:hover { color: #6fdd8b; }
  .pr-card.checks-pass a { color: #fff; }
  .pr-card.checks-pass:hover { border-color: #6fdd8b; }
  .pr-card.needs-rebase {
    background: #8a7000; border-color: #f0d000; color: #fff;
  }
  .pr-card.needs-rebase .pr-card-number,
  .pr-card.needs-rebase .pr-card-age,
  .pr-card.needs-rebase .pr-card-meta-item,
  .pr-card.needs-rebase .review-pending { color: rgba(255,255,255,0.8); }
  .pr-card.needs-rebase .pr-card-title a { color: #fff; }
  .pr-card.needs-rebase .pr-card-title a:hover { color: #ffe14d; }
  .pr-card.needs-rebase a { color: #fff; }
  .pr-card.needs-rebase:hover { border-color: #ffe14d; }
  .pr-card.has-conflicts {
    background: #8b1a1a; border-color: #f85149; color: #fff;
  }
  .pr-card.has-conflicts .pr-card-number,
  .pr-card.has-conflicts .pr-card-age,
  .pr-card.has-conflicts .pr-card-meta-item,
  .pr-card.has-conflicts .review-pending { color: rgba(255,255,255,0.8); }
  .pr-card.has-conflicts .pr-card-title a { color: #fff; }
  .pr-card.has-conflicts .pr-card-title a:hover { color: #ff8882; }
  .pr-card.has-conflicts a { color: #fff; }
  .pr-card.has-conflicts:hover { border-color: #ff8882; }
  .pr-card-header {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  }
  .pr-card-number { color: var(--text-muted); font-size: 13px; font-weight: 500; white-space: nowrap; }
  .pr-card-title {
    font-size: 14px; font-weight: 600; line-height: 1.4;
  }
  .pr-card-title a { color: var(--text); }
  .pr-card-title a:hover { color: var(--accent); }
  .pr-card-author {
    display: flex; align-items: center; gap: 8px; font-size: 13px;
  }
  .pr-card-author .avatar { width: 22px; height: 22px; }
  .pr-card-meta {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 12px;
  }
  .pr-card-meta-item {
    display: inline-flex; align-items: center; gap: 4px;
  }
  .pr-card-age { color: var(--text-muted); font-size: 12px; margin-left: auto; }
  .pr-card-actions { margin-top: auto; display: flex; justify-content: flex-end; }
  .approve-btn {
    background: var(--green); color: #fff; border: none; padding: 5px 14px;
    border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .approve-btn:hover { background: #2ea043; }
  .approve-btn:disabled {
    background: var(--border); color: var(--text-muted); cursor: not-allowed; opacity: 0.5;
  }
  .approve-btn.loading { opacity: 0.6; pointer-events: none; }
  .merge-btn {
    background: var(--purple); color: #fff; border: none; padding: 5px 14px;
    border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .merge-btn:hover { background: #a371f7; }
  .merge-btn:disabled {
    background: var(--border); color: var(--text-muted); cursor: not-allowed; opacity: 0.5;
  }
  .merge-btn.loading { opacity: 0.6; pointer-events: none; }
  .pr-card-empty {
    text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  }

  /* Activity feed */
  .activity-list { list-style: none; }
  .activity-item {
    padding: 10px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 12px; font-size: 13px;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .activity-time { color: var(--text-muted); font-size: 11px; white-space: nowrap; margin-left: auto; flex-shrink: 0; }

  /* Tabs */
  .tabs {
    display: flex; gap: 0; margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    background: transparent; border: none; color: var(--text-muted);
    padding: 10px 20px; font-size: 14px; cursor: pointer;
    border-bottom: 2px solid transparent; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn .tab-count {
    background: var(--border); color: var(--text-muted); font-size: 11px;
    padding: 0 7px; border-radius: 10px; font-weight: 500;
  }
  .tab-btn.active .tab-count { background: rgba(88, 166, 255, 0.2); color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Loading */
  .loading-msg {
    text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px;
  }
  .error-msg { color: var(--red); padding: 16px; text-align: center; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Author avatar */
  .author-cell { display: flex; align-items: center; gap: 8px; }
  .avatar {
    width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .stats-bar { flex-direction: column; }
    .stat-card { min-width: unset; }
    table { font-size: 12px; }
    th, td { padding: 8px 10px; }
  }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Dashboard -->
  <div id="dashboard">
    <header>
      <h1>📋 Team Tracker <span>GitHub Dashboard</span></h1>
      <div class="header-controls">
        <span class="last-updated" id="last-updated"></span>
        <button class="refresh-btn" onclick="refresh()" id="refresh-btn">
          <span>↻</span> Refresh
        </button>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Tabs -->
    <div class="tabs" id="tab-bar">
      <button class="tab-btn active" onclick="switchTab('issues')">Issues <span class="tab-count" id="tab-issues-count">0</span></button>
      <button class="tab-btn" onclick="switchTab('prs')">Pull Requests <span class="tab-count" id="tab-prs-count">0</span></button>
      <button class="tab-btn" onclick="switchTab('activity')">Claude Activity <span class="tab-count" id="tab-activity-count">0</span></button>
    </div>

    <!-- Issues Tab -->
    <div class="tab-panel active" id="tab-issues">
      <div class="section">
        <div class="section-header">
          <div></div>
          <div class="filters" id="issues-filters"></div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:50px">#</th>
                <th>Title</th>
                <th>Author</th>
                <th>Labels</th>
                <th>Claude</th>
                <th>Age</th>
              </tr>
            </thead>
            <tbody id="issues-body">
              <tr><td colspan="6" class="loading-msg"><div class="spinner"></div> Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Pull Requests Tab -->
    <div class="tab-panel" id="tab-prs">
      <div class="section">
        <div class="section-header">
          <div></div>
          <div class="filters" id="prs-filters"></div>
        </div>
        <div id="prs-grid" class="pr-card-grid">
          <div class="pr-card-empty"><div class="spinner"></div> Loading…</div>
        </div>
      </div>
    </div>

    <!-- Claude Activity Tab -->
    <div class="tab-panel" id="tab-activity">
      <div class="section">
        <div class="table-wrap">
          <ul class="activity-list" id="activity-list">
            <li class="activity-item loading-msg"><div class="spinner"></div> Loading…</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let state = { issues: [], prs: [], activity: [], issueFilter: 'all', prFilter: 'all',
              issueClaudeStatus: {}, prClaudeStatus: {}, prCIStatus: {}, prReviewStatus: {}, prMergeStatus: {},
              repo: '' };

// ---------- Rendering helpers ----------
function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  const days = Math.floor(hrs / 24);
  if (days < 30) return `${days}d`;
  return `${Math.floor(days / 30)}mo`;
}

function labelPill(label) {
  const name = label.name.toLowerCase();
  let cls = 'pill-other';
  if (name === 'bug') cls = 'pill-bug';
  else if (name === 'enhancement') cls = 'pill-enhancement';
  else if (name === 'claimed') cls = 'pill-claimed';
  else if (name === 'question') cls = 'pill-question';
  else if (name.includes('clarification')) cls = 'pill-needs-clarification';
  return `<span class="pill ${cls}">${esc(label.name)}</span>`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ---------- Render functions ----------
function renderStats() {
  const issues = state.issues;
  const prs = state.prs;
  const bugs = issues.filter(i => i.labels.some(l => l.name === 'bug')).length;
  const claimed = issues.filter(i => i.labels.some(l => l.name === 'claimed')).length;
  const claudeFails = Object.values(state.prClaudeStatus || {}).filter(s => s.status === 'fail').length;
  const changesReq = Object.values(state.prReviewStatus || {}).filter(s => s.status === 'changes').length;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-card"><div class="label">Open Issues</div><div class="value accent">${issues.length}</div></div>
    <div class="stat-card"><div class="label">Bugs</div><div class="value red">${bugs}</div></div>
    <div class="stat-card"><div class="label">Claimed</div><div class="value green">${claimed}</div></div>
    <div class="stat-card"><div class="label">Open PRs</div><div class="value accent">${prs.length}</div></div>
    <div class="stat-card"><div class="label">Claude Fails</div><div class="value red">${claudeFails}</div></div>
    <div class="stat-card"><div class="label">Changes Requested</div><div class="value yellow">${changesReq}</div></div>
  `;
}

function renderIssues() {
  const repo = state.repo;
  let issues = state.issues;

  if (state.issueFilter === 'bug') issues = issues.filter(i => i.labels.some(l => l.name === 'bug'));
  else if (state.issueFilter === 'enhancement') issues = issues.filter(i => i.labels.some(l => l.name === 'enhancement'));
  else if (state.issueFilter === 'claimed') issues = issues.filter(i => i.labels.some(l => l.name === 'claimed'));
  else if (state.issueFilter === 'unclaimed') issues = issues.filter(i => !i.labels.some(l => l.name === 'claimed'));
  else if (state.issueFilter === 'claude-triaged') issues = issues.filter(i => state.issueClaudeStatus[i.number]);

  document.getElementById('tab-issues-count').textContent = issues.length;

  const filterDefs = [
    { key: 'all', label: 'All' },
    { key: 'bug', label: 'Bugs' },
    { key: 'enhancement', label: 'Enhancements' },
    { key: 'claimed', label: 'Claimed' },
    { key: 'unclaimed', label: 'Unclaimed' },
    { key: 'claude-triaged', label: 'Claude triaged' },
  ];
  document.getElementById('issues-filters').innerHTML = filterDefs.map(f =>
    `<button class="filter-btn ${state.issueFilter === f.key ? 'active' : ''}"
             onclick="setIssueFilter('${f.key}')">${f.label}</button>`
  ).join('');

  if (issues.length === 0) {
    document.getElementById('issues-body').innerHTML =
      '<tr><td colspan="6" class="loading-msg" style="color:var(--text-muted)">No issues match this filter</td></tr>';
    return;
  }

  document.getElementById('issues-body').innerHTML = issues.map(issue => {
    const claudeTriaged = state.issueClaudeStatus[issue.number];
    const claudeHtml = claudeTriaged
      ? '<span class="claude-badge claude-triaged"><span class="claude-icon">R</span> Triaged</span>'
      : '<span style="color:var(--text-muted)">\u2014</span>';

    return `<tr>
      <td><a href="https://github.com/${repo}/issues/${issue.number}" target="_blank">#${issue.number}</a></td>
      <td><a href="https://github.com/${repo}/issues/${issue.number}" target="_blank">${esc(issue.title)}</a></td>
      <td><div class="author-cell">
        <img class="avatar" src="${issue.user.avatar_url}&s=40" alt="" />
        <a href="https://github.com/${issue.user.login}" target="_blank">${esc(issue.user.login)}</a>
      </div></td>
      <td>${issue.labels.map(labelPill).join(' ')}</td>
      <td>${claudeHtml}</td>
      <td title="${new Date(issue.created_at).toLocaleDateString()}">${timeAgo(issue.created_at)}</td>
    </tr>`;
  }).join('');
}

function renderPRs() {
  const repo = state.repo;
  let prs = state.prs;

  if (state.prFilter === 'claude-pass') prs = prs.filter(p => state.prClaudeStatus[p.number]?.status === 'pass');
  else if (state.prFilter === 'claude-fail') prs = prs.filter(p => state.prClaudeStatus[p.number]?.status === 'fail');
  else if (state.prFilter === 'changes-requested') prs = prs.filter(p => state.prReviewStatus[p.number]?.status === 'changes');
  else if (state.prFilter === 'approved') prs = prs.filter(p => state.prReviewStatus[p.number]?.status === 'approved');
  else if (state.prFilter === 'needs-review') prs = prs.filter(p => state.prReviewStatus[p.number]?.status === 'pending');

  document.getElementById('tab-prs-count').textContent = prs.length;

  const filterDefs = [
    { key: 'all', label: 'All' },
    { key: 'claude-pass', label: 'Claude Pass' },
    { key: 'claude-fail', label: 'Claude Fail' },
    { key: 'approved', label: 'Approved' },
    { key: 'changes-requested', label: 'Changes Req.' },
    { key: 'needs-review', label: 'Needs Review' },
  ];
  document.getElementById('prs-filters').innerHTML = filterDefs.map(f =>
    `<button class="filter-btn ${state.prFilter === f.key ? 'active' : ''}"
             onclick="setPRFilter('${f.key}')">${f.label}</button>`
  ).join('');

  const grid = document.getElementById('prs-grid');

  if (prs.length === 0) {
    grid.innerHTML = '<div class="pr-card-empty">No PRs match this filter</div>';
    return;
  }

  grid.innerHTML = prs.map(pr => {
    const ci = state.prCIStatus[pr.number] || { status: 'none', label: '\u2014' };
    const claude = state.prClaudeStatus[pr.number] || { status: 'none', label: '\u2014' };
    const review = state.prReviewStatus[pr.number] || { status: 'pending', label: 'Pending' };

    const merge = state.prMergeStatus[pr.number] || 'clean';
    const allChecksPassing = ci.status === 'pass' && claude.status !== 'fail' && merge !== 'conflicts';
    let cardCls = 'pr-card';
    if (merge === 'conflicts' || ci.status === 'fail' || claude.status === 'fail') cardCls = 'pr-card has-conflicts';
    else if (merge === 'behind') cardCls = 'pr-card needs-rebase';
    else if (ci.status === 'pass') cardCls = 'pr-card checks-pass';

    const ciCls = ci.status === 'pass' ? 'ci-pass' : ci.status === 'fail' ? 'ci-fail' : 'ci-pending';
    const ciIcon = ci.status === 'pass' ? '\u2713' : ci.status === 'fail' ? '\u2717' : ci.status === 'pending' ? '\u25CC' : '';
    const claudeCls = `claude-${claude.status}`;
    const reviewCls = review.status === 'approved' ? 'review-approved' :
                      review.status === 'changes' ? 'review-changes' : 'review-pending';

    return `<div class="${cardCls}">
      <div class="pr-card-header">
        <div class="pr-card-title">
          <a href="https://github.com/${repo}/pull/${pr.number}" target="_blank">${esc(pr.title)}</a>
          ${pr.draft ? ' <span class="pill pill-other">Draft</span>' : ''}
        </div>
        <span class="pr-card-number">#${pr.number}</span>
      </div>
      <div class="pr-card-author">
        <img class="avatar" src="${pr.user.avatar_url}&s=40" alt="" />
        <a href="https://github.com/${pr.user.login}" target="_blank">${esc(pr.user.login)}</a>
        <span class="pr-card-age" title="${new Date(pr.created_at).toLocaleDateString()}">${timeAgo(pr.created_at)}</span>
      </div>
      <div class="pr-card-meta">
        <span class="pr-card-meta-item ${ciCls}">${ciIcon} CI: ${ci.label}</span>
        <span class="pr-card-meta-item"><span class="claude-badge ${claudeCls}"><span class="claude-icon">R</span> ${claude.label}</span></span>
        <span class="pr-card-meta-item ${reviewCls}">${review.label}</span>
        ${merge === 'conflicts' ? '<span class="pr-card-meta-item" style="color:var(--red)">! Conflicts</span>' : ''}
        ${merge === 'behind' ? '<span class="pr-card-meta-item" style="color:var(--yellow)">~ Needs rebase</span>' : ''}
      </div>
      <div class="pr-card-actions">
        ${(review.status === 'approved' || pr.user.login === state.currentUser)
          ? `<button class="merge-btn" id="merge-btn-${pr.number}"
              onclick="mergePR(${pr.number})"
              ${merge === 'conflicts' ? 'disabled title="Resolve conflicts before merging"' : ''}
            >Merge</button>`
          : `<button class="approve-btn" id="approve-btn-${pr.number}"
              onclick="approvePR(${pr.number})"
              ${allChecksPassing ? '' : 'disabled title="Checks must pass before approving"'}
            >Approve</button>`
        }
      </div>
    </div>`;
  }).join('');
}

function renderActivity() {
  const list = document.getElementById('activity-list');
  const repo = state.repo;
  const activities = state.activity;

  document.getElementById('tab-activity-count').textContent = activities.length;

  if (activities.length === 0) {
    list.innerHTML = '<li class="activity-item" style="color:var(--text-muted)">No recent Claude activity</li>';
    return;
  }

  list.innerHTML = activities.slice(0, 30).map(a => {
    const link = a.prNumber
      ? `<a href="https://github.com/${repo}/pull/${a.prNumber}" target="_blank">#${a.prNumber}</a>`
      : a.issueNumber
        ? `<a href="https://github.com/${repo}/issues/${a.issueNumber}" target="_blank">#${a.issueNumber}</a>`
        : '';
    const bodyHtml = a.body ? ` \u2014 <span style="color:var(--text-muted)">${esc(a.body)}</span>` : '';
    return `<li class="activity-item">
      <span class="activity-icon">${a.icon}</span>
      <span>${esc(a.text).replace(/#(\d+)/, link)}${bodyHtml}</span>
      <span class="activity-time">${timeAgo(a.date)}</span>
    </li>`;
  }).join('');
}

function renderAll() {
  renderStats();
  renderIssues();
  renderPRs();
  renderActivity();
}

// ---------- Actions ----------
async function approvePR(prNum) {
  const btn = document.getElementById(`approve-btn-${prNum}`);
  if (!btn) return;
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> Approving';

  try {
    const resp = await fetch(`/api/prs/${prNum}/approve`, { method: 'POST' });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `${resp.status}`);
    }
    state.prReviewStatus[prNum] = { status: 'approved', label: 'Approved' };
    renderPRs();
  } catch (err) {
    btn.classList.remove('loading');
    btn.innerHTML = 'Failed';
    btn.style.background = 'var(--red)';
    btn.title = err.message;
    setTimeout(() => { btn.innerHTML = 'Approve'; btn.style.background = ''; btn.classList.remove('loading'); }, 3000);
  }
}

async function mergePR(prNum) {
  const btn = document.getElementById(`merge-btn-${prNum}`);
  if (!btn) return;
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> Merging';

  try {
    const resp = await fetch(`/api/prs/${prNum}/merge`, { method: 'PUT' });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error || `${resp.status}`);
    }
    state.prs = state.prs.filter(p => p.number !== prNum);
    renderStats();
    renderPRs();
  } catch (err) {
    btn.classList.remove('loading');
    btn.innerHTML = 'Failed';
    btn.style.background = 'var(--red)';
    btn.title = err.message;
    setTimeout(() => { btn.innerHTML = 'Merge'; btn.style.background = ''; btn.classList.remove('loading'); }, 3000);
  }
}

// ---------- Tabs & Filters ----------
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  const btns = document.querySelectorAll('.tab-btn');
  const tabIndex = { issues: 0, prs: 1, activity: 2 };
  btns[tabIndex[tab]].classList.add('active');
  location.hash = tab;
}

function setIssueFilter(key) { state.issueFilter = key; renderIssues(); }
function setPRFilter(key) { state.prFilter = key; renderPRs(); }

// ---------- Data loading ----------
function applyData(data) {
  state.issues = data.issues || [];
  state.prs = data.prs || [];
  state.activity = data.activity || [];
  state.issueClaudeStatus = data.issueClaudeStatus || {};
  state.prClaudeStatus = data.prClaudeStatus || {};
  state.prCIStatus = data.prCIStatus || {};
  state.prReviewStatus = data.prReviewStatus || {};
  state.prMergeStatus = data.prMergeStatus || {};
  state.repo = data.repo || '';
  state.currentUser = data.currentUser || '';
  renderAll();
  if (data.lastUpdated) {
    document.getElementById('last-updated').textContent = `Updated ${new Date(data.lastUpdated).toLocaleTimeString()}`;
  }
}

async function loadCached() {
  try {
    const resp = await fetch('/api/data');
    const data = await resp.json();
    if (data.lastUpdated) applyData(data);
  } catch {}
}

async function refresh() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.innerHTML = '<span class="spinner"></span> Refreshing';

  try {
    const resp = await fetch('/api/refresh', { method: 'POST' });
    const data = await resp.json();
    applyData(data);
  } catch (err) {
    console.error(err);
  }

  btn.classList.remove('loading');
  btn.innerHTML = '<span>\u21BB</span> Refresh';
}

// ---------- Boot ----------
(async () => {
  const hashTab = location.hash.replace('#', '');
  if (['issues', 'prs', 'activity'].includes(hashTab)) switchTab(hashTab);
  await loadCached();
  if (state.issues.length === 0 && state.prs.length === 0) {
    refresh();
  }
})();
</script>
</body>
</html>
